site_name: obs_exporter
site_description: Prometheus + OTLP exporter for Dell EMC ECS / ObjectScale object storage
repo_url: https://github.com/fjacquet/obs_exporter
repo_name: fjacquet/obs_exporter
theme:
  name: material
  favicon: assets/favicon.png
  logo: assets/logo.png
  features: [navigation.sections, navigation.top, content.code.copy]

---
# End-to-end demo stack — exporter from the PUBLISHED GHCR image.
#   docker compose -f docker-compose.ghcr.yml up      (or: make demo-ghcr)
# Then open Grafana at http://localhost:3000 (admin/admin) → "ObjectScale — Overview".
#
# Only mockecs is built locally (it is demo-only and never published).
services:
  mockecs:
    build:
      context: .
      dockerfile: deploy/mockecs/Dockerfile
    image: obs_mockecs
    pull_policy: build
    container_name: obs_mockecs
    restart: unless-stopped

  obs_exporter:
    image: ghcr.io/fjacquet/obs_exporter:latest
    container_name: obs_exporter
    command: ["--config", "/etc/obs_exporter/config.yaml"]
    ports:
      - "9438:9438"
    volumes:
      - ./config.demo.yaml:/etc/obs_exporter/config.yaml:ro
    depends_on:
      - mockecs
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: obs_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - obs_exporter
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: obs_grafana
    ports:
      - "3000:3000"
    environment:
      # Test-stack credentials (admin / admin). Change for anything non-local.
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

replicaCount: 1

image:
  repository: ghcr.io/fjacquet/obs_exporter
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 9438

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
readinessProbe:
  httpGet:
    path: /health
    port: http

volumes: []
# - name: config-templated
#   emptyDir:
#     sizeLimit: 16Mi
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

volumeMounts: []
# - mountPath: /app/config
#   name: config-templated
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

extraArgs: []

existingSecret: ""

# Inline exporter config, rendered into a Secret and mounted at /etc/obs_exporter/config.yaml.
# The --config flag is set automatically by the Deployment. This is a free-form passthrough —
# add any config here, including the optional `otlp:` block to enable the OTLP push loop.
# Secrets (username, password) are shown as placeholders; inject real values via env vars
# (${OBS1_USERNAME} etc.) or reference an existingSecret instead.
config: |
  server:
    host: "0.0.0.0"
    port: "9438"
    uri: "/metrics"
  collection:
    interval: "5m"
    timeout: "60s"
  # Optional OTLP gRPC metric push (disabled while endpoint is empty).
  otlp:
    endpoint: ""
    insecure: false
    interval: "10s"
  clusters:
    - name: obs-prod-01
      host: "OBS1_HOSTNAME"
      username: "OBS1_USERNAME"
      password: "OBS1_PASSWORD"
      # insecureSkipVerify: true
      # collectMetering: false
      # collectDT: true

env: []
# - name: OBS1_HOSTNAME
#   value: ecs.example.com
# - name: OBS1_USERNAME
#   value: monitor
# - name: OBS1_PASSWORD
#   valueFrom:
#     secretKeyRef:
#        name: my-external-obs-secret
#        key: obs-password

deploymentAnnotations: {}

podAnnotations:
  prometheus.io/scrape: "false"
  prometheus.io/path: "/metrics"
  prometheus.io/port: "9438"

prometheus:
  monitor:
    enabled: false
    additionalLabels: {}
    interval: 15s
    namespace: []
    metricRelabelings: []
    relabelings: []
    targetLabels: []

  rules:
    enabled: false
    additionalLabels: {}
    namespace: ""
    additionalRules: []

  scrapeConfig:
    enabled: false
    additionalLabels: {}
    namespace: ""
    interval: 60s
    scrapeTimeout: 55s
    metricRelabelings: []
    relabelings: []
